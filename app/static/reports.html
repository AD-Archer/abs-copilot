<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ABS Reports</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <a class="chip" href="/">Home</a>
          <a class="chip" href="/team">Team Overview</a>
          <a class="chip" href="/player">Player Lens</a>
          <a class="chip" href="/copilot">Ask Copilot</a>
          <a class="chip" href="/reports-view">Reports</a>
        </div>
        <h1>Weekly Reports</h1>
        <p class="subtle">Pick a generated markdown report to preview it with full formatting.</p>
        <div class="row">
          <div>
            <label>Team</label>
            <select id="teamSelect"></select>
          </div>
          <div>
            <label>Week Start</label>
            <input id="weekStart" type="date" />
          </div>
        </div>
        <div class="row">
          <button id="generateBtn" onclick="generateReport()">Generate Report</button>
          <button class="ghost" onclick="loadReports()">Refresh List</button>
        </div>
        <div id="genStatus" class="subtle" style="margin-top: 8px"></div>
      </div>

      <div class="grid two">
        <div class="panel">
          <h3>Available Files</h3>
          <div id="reportList" class="list"></div>
        </div>
        <div class="panel">
          <h3 id="reportTitle">Preview</h3>
          <div id="reportBody" class="markdown-body subtle">No report selected yet.</div>
        </div>
      </div>
      <footer data-site-footer></footer>
    </div>
    <script>
      function renderMarkdown(mdText) {
        return DOMPurify.sanitize(marked.parse(mdText || ""));
      }

      async function loadTeams() {
        const res = await fetch("/dashboard/teams");
        const data = await res.json();
        const select = document.getElementById("teamSelect");
        select.innerHTML = "";
        for (const team of data.teams || []) {
          const opt = document.createElement("option");
          opt.value = team;
          opt.textContent = team;
          select.appendChild(opt);
        }
      }

      function mondayOfCurrentWeek() {
        const now = new Date();
        const day = now.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        const monday = new Date(now);
        monday.setDate(now.getDate() + diff);
        return monday.toISOString().slice(0, 10);
      }

      async function generateReport() {
        const team = document.getElementById("teamSelect").value;
        const weekStart = document.getElementById("weekStart").value;
        const button = document.getElementById("generateBtn");
        const status = document.getElementById("genStatus");
        if (!team || !weekStart) {
          status.textContent = "Select team and week start first.";
          return;
        }
        button.disabled = true;
        status.textContent = "Generating report...";
        try {
          const res = await fetch("/reports/weekly", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ team_name: team, week_start: weekStart }),
          });
          if (!res.ok) {
            status.textContent = "Report generation failed.";
            return;
          }
          const data = await res.json();
          status.textContent = `Generated: ${data.report_markdown_path}`;
          await loadReports();
        } catch {
          status.textContent = "Network error while generating report.";
        } finally {
          button.disabled = false;
        }
      }

      async function loadReport(name) {
        const res = await fetch(`/reports/content/${encodeURIComponent(name)}`);
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById("reportTitle").textContent = data.name;
        document.getElementById("reportBody").classList.remove("subtle");
        document.getElementById("reportBody").innerHTML = renderMarkdown(data.markdown);
      }

      async function loadReports() {
        const res = await fetch("/reports/list");
        const data = await res.json();
        const container = document.getElementById("reportList");
        container.innerHTML = "";
        const reports = data.reports || [];
        if (!reports.length) {
          container.innerHTML = '<div class="subtle" style="padding: 10px;">No markdown reports yet. Generate one from API or chat workflows.</div>';
          return;
        }
        for (const report of reports) {
          const btn = document.createElement("button");
          btn.textContent = report.name;
          btn.onclick = () => loadReport(report.name);
          container.appendChild(btn);
        }
        loadReport(reports[0].name);
      }

      document.getElementById("weekStart").value = mondayOfCurrentWeek();
      loadTeams().then(loadReports);
    </script>
    <script src="/static/footer.js"></script>
  </body>
</html>
